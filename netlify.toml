[build]
  publish = "."

# Proxy toutes les requêtes /api/* vers le vrai backend Node (Render).
# Remplacez l'URL ci-dessous par celle donnée par Render une fois le service déployé.
[[redirects]]
  from = "/api/*"
  to = "https://ecoute-anonyme.onrender.com/api/:splat"
  status = 200
  force = true
